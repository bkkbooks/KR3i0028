body:
  text: 糖霜譜譜録類二飲饌之屬提要臣等謹案糖霜譜一卷宋王灼撰灼字晦叔號頤堂遂寧人紹興中嘗為幕官是編凡分七篇惟首篇題原委第一叙唐大厯中鄒和尚始創糖霜之事自第二篇以下則皆無標題今以其文考之第二篇言以蔗為糖始末言蔗漿始見楚詞而蔗餳始見三國志第三篇言種蔗第四篇言造糖之器第五篇言結霜之法第六篇言糖霜或結或不結似有運命因及於宣和中供御諸事第七篇則糖霜之性味及製食諸法也葢宋時産糖霜者凡福唐四明畨禺廣漢遂寧五地而遂寧為最灼生於遂寧故為此譜所考古人題咏始於蘇黄案古人謂糟為糖晉書何曽傳所云蟹之將糖躁擾彌甚是也説文有飴字無糖字徐鉉新附字中乃有之然亦訓為飴不言蔗造鉉五代宋初人也尚不知蔗糖事則灼所徴故實始於元祐非疎漏矣惟灼稱糖霜以紫色為上白色為下而今日所尚乃貴白而賤紫灼稱糖霜須一年有半乃結其結也以自然今則製之甚易其法亦不相同是亦今古異宜未可執後來追議前人也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f82d444452d9ae08de4f42575c961939437d8c4c1a040dda36afe89814d214bc
